<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background circle -->
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  <!-- Wallet body -->
  <rect x="8" y="20" width="40" height="30" rx="4" fill="#2a9d8f"/>
  <rect x="8" y="20" width="40" height="6" rx="2" fill="#21867a"/>
  <!-- Wallet clasp -->
  <circle cx="48" cy="35" r="5" fill="#1a6b63" stroke="#2a9d8f" stroke-width="1.5"/>
  <circle cx="48" cy="35" r="2" fill="#2a9d8f"/>
  <!-- Red bar chart bars -->
  <rect x="14" y="38" width="5" height="10" rx="1" fill="#e76f6f"/>
  <rect x="21" y="33" width="5" height="15" rx="1" fill="#e76f6f"/>
  <rect x="28" y="28" width="5" height="20" rx="1" fill="#e76f6f"/>
  <!-- Green upward arrow line -->
  <polyline points="13,44 22,36 30,40 42,22" fill="none" stroke="#00e5a0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head -->
  <polygon points="42,22 38,24 44,28" fill="#00e5a0"/>
</svg>
